<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="none">
    <title>欢迎光临怸歪小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        /* 根变量：浅色模式（极简文艺风） */
        :root {
            --bg-color: #fefefe;
            --text-primary: #333;
            --text-secondary: #666;
            --text-desc: #777;
            /* 主页按钮：透明背景 + 细边框 */
            --btn-bg: transparent;
            --btn-color: #555;
            --btn-border: 1px solid #999;
            --btn-radius: 4px;
            /* 切换按钮专属变量 */
            --toggle-color: #555;
            --toggle-border: 1px solid #999;
        }

        /* 深色模式（简约暗黑风） */
        body.dark {
            --bg-color: #121212;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --text-desc: #888;
            /* 🔥 关键修改：深色模式下，主页按钮也保持 透明背景 + 细边框 */
            --btn-bg: transparent;
            --btn-color: #f0f0f0;
            --btn-border: 1px solid #666;
            --btn-radius: 4px;
            /* 切换按钮专属深色样式 */
            --toggle-color: #f0f0f0;
            --toggle-border: 1px solid #666;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: "lucida grande", "lucida sans unicode", lucida, helvetica, "PingFang SC", "Hiragino Sans GB", "STHeiti Light", "Microsoft YaHei", "WenQuanYi Micro Hei";
            position: relative;
        }

        /* 模式切换按钮：固定圆形 */
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            color: var(--toggle-color);
            border: var(--toggle-border);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 80px);
            line-height: 1.2;
            margin-bottom: 30px;
            color: var(--text-primary);
            font-weight: 700;
        }

        h2 {
            font-size: clamp(1.2rem, 3vw, 28px);
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.8;
            font-weight: 600;
        }

        p {
            font-size: 18px;
            line-height: 2.2;
            color: var(--text-desc);
        }

        /* 主页按钮样式 */
        a {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 28px;
            color: var(--btn-color);
            background-color: var(--btn-bg);
            border: var(--btn-border);
            border-radius: var(--btn-radius);
            transition: all 0.3s ease;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(64, 158, 255, 0.2);
        }

        body.dark a:hover {
            box-shadow: 0 4px 15px rgba(64, 158, 255, 0.4);
        }
    </style>
</head>
<body>
    <button class="mode-toggle" onclick="toggleMode()">☀️</button>

    <h1>欢迎光临怸歪小站</h1>
    <h2>能看到这个页面说明你很牛逼了！</h2>
    <p>更多内容点击下方链接访问我的主页~<br>
        <a href="https://cycy.fun" target="_blank" rel="noopener noreferrer">怸歪小站CYCY.FUN ></a>
    </p>

    <script>
        function toggleMode() {
            const body = document.body;
            const toggleBtn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark');
            toggleBtn.textContent = body.classList.contains('dark') ? '🌙' : '☀️';
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                document.querySelector('.mode-toggle').textContent = '🌙';
            }
        }
    </script>
</body>
</html>
